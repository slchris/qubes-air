---
# Qubes Air - Zone Bootstrap Playbook
#
# 初始化远程 Zone 基础设施
# 在 Salt 接管之前执行一次性配置

- name: Bootstrap Zone Infrastructure
  hosts: zone_admins
  become: true
  gather_facts: true

  vars:
    salt_master_version: "3006"
    wireguard_listen_port: 51820

  pre_tasks:
    - name: Display zone information
      ansible.builtin.debug:
        msg: "Bootstrapping Zone: {{ zone_name }} ({{ zone_type }})"

  tasks:
    # ==========================================
    # 基础系统配置
    # ==========================================

    # Deliberately NOT a blanket "upgrade everything". A full upgrade on a
    # gateway during bootstrap can pull in a kernel and leave the machine
    # needing a reboot mid-play, and the previous form only ran on RedHat
    # anyway — a leftover from when this project assumed Fedora, which the
    # fleet has not used for some time. Refreshing the package index is what
    # the installs below actually need.
    - name: Refresh package index
      ansible.builtin.package:
        update_cache: true
      changed_when: false

    - name: Install required packages
      ansible.builtin.package:
        name:
          - wireguard-tools
          - python3
          - python3-pip
          - git
          - vim
          - htop
          - jq
        state: present

    # ==========================================
    # WireGuard 配置
    # ==========================================

    - name: Create WireGuard directory
      ansible.builtin.file:
        path: /etc/wireguard
        state: directory
        mode: '0700'

    # The private key is generated on the target and never read back.
    #
    # This task used to end in `cat /etc/wireguard/private.key` with
    # `register: wg_private_key`, and nothing ever used that variable. It put
    # the key into Ansible's result data for no benefit: `-v` prints it, and any
    # callback plugin or log captures it. The whole point of generating on the
    # target (see terraform/modules/zone-base/main.tf, which removed an earlier
    # attempt to generate keys in terraform because they landed in state) is
    # that the key never leaves the machine — reading it back defeats that just
    # as thoroughly as generating it elsewhere would have.
    #
    # umask rather than a follow-up chmod: the file must never exist, even
    # briefly, with default permissions.
    - name: Generate WireGuard private key (stays on the target)
      ansible.builtin.shell: |
        set -eu
        umask 077
        if [ ! -f /etc/wireguard/private.key ]; then
          wg genkey > /etc/wireguard/private.key
        fi
      args:
        creates: /etc/wireguard/private.key

    # Only the PUBLIC key comes back. It is what terraform's
    # zone-base var.wireguard_pubkey expects, and it is public by nature.
    - name: Derive WireGuard public key
      ansible.builtin.shell: |
        set -eu
        wg pubkey < /etc/wireguard/private.key
      register: wg_public_key
      changed_when: false

    - name: Display WireGuard public key
      ansible.builtin.debug:
        msg: >-
          WireGuard public key for {{ zone_name }}: {{ wg_public_key.stdout }}
          -- feed this into the zone's wireguard_pubkey. Nothing does that
          automatically yet; see docs/bootstrap-design.md section 11.

    # ==========================================
    # Salt Master 安装 (可选)
    # ==========================================

    - name: Install Salt Master
      ansible.builtin.shell: |
        curl -fsSL https://bootstrap.saltproject.io -o install_salt.sh
        sh install_salt.sh -M -x python3 stable {{ salt_master_version }}
      args:
        creates: /usr/bin/salt-master
      when: install_salt_master | default(false)

    # ==========================================
    # Qubes Air 目录结构
    # ==========================================

    - name: Create Qubes Air directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/qubes-air
        - /opt/qubes-air/bin
        - /opt/qubes-air/etc
        - /opt/qubes-air/log

  # No handlers. There was a "Restart WireGuard" handler for wg-quick@wg0 that
  # no task ever notified, so it could not fire — and it could not have helped
  # if it had: this play writes no /etc/wireguard/wg0.conf at all. It installs
  # the tools and generates a key, and that is the whole of it.
  #
  # Bringing an interface up needs the peer set, addresses and AllowedIPs, and
  # those depend on decisions this play cannot make alone (see
  # docs/bootstrap-design.md section 11). A handler that restarts a unit with no
  # config would report success and leave the tunnel down, which is the failure
  # shape this project keeps having to remove.
