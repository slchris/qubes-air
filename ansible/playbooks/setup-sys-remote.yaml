---
# Qubes Air - sys-remote Setup Playbook
#
# 初始化 sys-remote Qube 配置
# 从 dom0 或管理 Qube 执行

- name: Setup sys-remote Qube
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    sys_remote_name: "sys-remote-{{ zone_name }}"
    template: "fedora-39"
    memory: 1024
    maxmem: 2048

  tasks:
    - name: Check if running in Qubes
      ansible.builtin.stat:
        path: /usr/bin/qvm-create
      register: qubes_check
      failed_when: not qubes_check.stat.exists

    # ==========================================
    # 创建 sys-remote Qube
    # ==========================================

    - name: Create sys-remote Qube
      ansible.builtin.command: |
        qvm-create --class AppVM \
          --template {{ template }} \
          --property netvm=sys-firewall \
          --property provides_network=true \
          --property memory={{ memory }} \
          --property maxmem={{ maxmem }} \
          --label orange \
          {{ sys_remote_name }}
      register: create_result
      changed_when: create_result.rc == 0
      failed_when: create_result.rc != 0 and "already exists" not in create_result.stderr

    # ==========================================
    # 配置 qrexec 策略
    # ==========================================

    - name: Create qrexec policy directory
      ansible.builtin.file:
        path: /etc/qubes/policy.d
        state: directory
        mode: '0755'
      become: true

    # =====================================================================
    # 【已废弃 - 阶段2】此处内联 policy 与 dom0 脚本漂移且语义颠倒
    # (给 sys-remote -> @adminvm allow, 即 Relay 直达 dom0 漏洞; qubes-air.Remote 是反模式)。
    # policy 已收敛到单一权威来源: dom0-scripts/policy.d/30-qubes-air.policy
    # (由 salt qubes-air.remotevm.dom0 部署)。本任务不再由 ansible 写 policy。
    # 保留一个 assert 提醒, 避免有人误以为这里还管 policy。
    # =====================================================================
    - name: DEPRECATED - policy 已收敛到 30-qubes-air.policy (single source)
      ansible.builtin.debug:
        msg: >
          qrexec policy 不再由本 playbook 写。请部署 dom0-scripts/policy.d/30-qubes-air.policy
          (经 salt qubes-air.remotevm.dom0)。旧的 80-qubes-air.policy 已废弃并应删除。

    - name: Remove deprecated 80-qubes-air.policy if present
      ansible.builtin.file:
        path: /etc/qubes/policy.d/80-qubes-air.policy
        state: absent
      become: true

    # ==========================================
    # 启动 sys-remote
    # ==========================================

    - name: Start sys-remote Qube
      ansible.builtin.command: qvm-start {{ sys_remote_name }}
      register: start_result
      changed_when: start_result.rc == 0
      failed_when: start_result.rc != 0 and "already running" not in start_result.stderr
