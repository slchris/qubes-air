<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- 社交分享图 1200×630。纯本地生成，无外部依赖。 -->
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1116"/>
      <stop offset="1" stop-color="#0a0c10"/>
    </linearGradient>
    <linearGradient id="og-top" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#c3d9ff"/><stop offset="1" stop-color="#93bbff"/>
    </linearGradient>
    <linearGradient id="og-right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6aa4ff"/><stop offset="1" stop-color="#3f7fe6"/>
    </linearGradient>
    <linearGradient id="og-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fbaff"/><stop offset="1" stop-color="#6b9bf0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#og-bg)"/>

  <!-- 细网格背景，低强度 -->
  <g opacity="0.5">
    <g stroke="#63a0ff" stroke-opacity="0.05" stroke-width="1">
      <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200 M0 360 H1200 M0 450 H1200 M0 540 H1200"/>
      <path d="M120 0 V630 M240 0 V630 M360 0 V630 M480 0 V630 M600 0 V630 M720 0 V630 M840 0 V630 M960 0 V630 M1080 0 V630"/>
    </g>
  </g>

  <!-- 顶部标签 -->
  <text x="100" y="150" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="24"
        letter-spacing="4" fill="#63a0ff" font-weight="600">社区实现 · 对齐官方 REMOTEVM</text>

  <!-- 主标题 -->
  <text x="98" y="270" font-family="ui-sans-serif, system-ui, 'Segoe UI', 'Noto Sans SC', sans-serif"
        font-size="76" font-weight="700" fill="#eef1f5" letter-spacing="-1">把 Qubes 的隔离</text>
  <text x="98" y="366" font-family="ui-sans-serif, system-ui, 'Segoe UI', 'Noto Sans SC', sans-serif"
        font-size="76" font-weight="700" fill="#eef1f5" letter-spacing="-1">带到云端和远端设备</text>

  <!-- 副文案 -->
  <text x="100" y="440" font-family="ui-sans-serif, system-ui, 'Noto Sans SC', sans-serif"
        font-size="28" fill="#b6bdc9">存算分离低成本 · 凭据不出 vault · 云厂商不可信的安全优先设计</text>

  <!-- 品牌行 -->
  <g transform="translate(100 500)">
    <g transform="translate(0 0) scale(0.72)">
      <path d="M32 8 L50 17 L32 26 L14 17 Z" fill="url(#og-top)"/>
      <path d="M14 33 L32 43 L32 61 L14 51 Z" fill="url(#og-left)"/>
      <path d="M50 33 L32 43 L32 61 L50 51 Z" fill="url(#og-right)"/>
      <path d="M14 33 L32 43 L50 33 L32 23 Z" fill="#0c0f14"/>
      <path d="M32 43 L50 33 L32 28 L14 33 Z" fill="#12233f"/>
    </g>
    <text x="58" y="34" font-family="ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="600" fill="#eef1f5">Qubes</text>
    <text x="168" y="34" font-family="ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="400" fill="#63a0ff">Air</text>
  </g>

  <!-- 右侧装饰立方体（大） -->
  <g transform="translate(880 210) scale(6.2)" opacity="0.95">
    <path d="M32 8 L50 17 L32 26 L14 17 Z" fill="url(#og-top)"/>
    <path d="M14 33 L32 43 L32 61 L14 51 Z" fill="url(#og-left)"/>
    <path d="M50 33 L32 43 L32 61 L50 51 Z" fill="url(#og-right)"/>
    <path d="M14 33 L32 43 L50 33 L32 23 Z" fill="#0c0f14"/>
    <path d="M32 43 L50 33 L32 28 L14 33 Z" fill="#12233f"/>
  </g>
</svg>
